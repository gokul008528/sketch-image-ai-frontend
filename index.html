<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sketch2Real — Turn line art into reality</title>
    <script>
      // Resolve and apply the theme before first paint to avoid a flash of
      // the wrong theme. Default preference is "light" (the new professional
      // default); "system" and "dark" remain available via the header toggle.
      (function () {
        try {
          var pref = localStorage.getItem('s2r_theme_preference') || 'light';
          var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var resolved = pref === 'system' ? (systemDark ? 'dark' : 'light') : pref;
          document.documentElement.setAttribute('data-theme', resolved);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
